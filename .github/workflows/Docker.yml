name: Build and Push to Docker Hub

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Debug - List files
        run: ls -la

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: kenyafisi/frp:latest

      - name: Trigger Zeabur Redeploy
        run: |
          curl -X POST https://api.zeabur.com/graphql \
            -H "Authorization: Bearer ${{ secrets.ZEABUR_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "mutation { redeployService(serviceID: \"service-698e34fd67b6b3d512131359\") }"}'
